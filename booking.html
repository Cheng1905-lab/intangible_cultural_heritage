<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约参观 - 非遗工坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9E2A2B',
                        secondary: '#2A6F97',
                        light: '#F5F0E6',
                        dark: '#332E29',
                    },
                    fontFamily: {
                        song: ['"Noto Serif SC"', 'serif'],
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .glass {
            background: rgba(245, 240, 230, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(42, 111, 151, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-light font-sans text-dark min-h-screen">
    <!-- 导航栏 (与map.html相同) -->
    <nav class="fixed top-0 left-0 w-full glass z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center">
                        <i class="fa fa-pagelines text-light text-xl"></i>
                    </div>
                    <span class="font-song font-bold text-xl text-primary">非遗工坊</span>
                </a>
                <div class="hidden md:flex gap-8">
                    <a href="index.html" class="text-secondary font-medium hover:text-primary transition-colors">首页</a>
                    <a href="heritage.html" class="text-secondary font-medium hover:text-primary transition-colors">非遗库</a>
                    <a href="class.html" class="text-secondary font-medium hover:text-primary transition-colors">在线课堂</a>
                    <a href="map.html" class="text-primary font-medium">非遗地图</a>
                    <a href="stories.html" class="text-secondary font-medium hover:text-primary transition-colors">非遗故事</a>
                    <a href="crowdfunding.html" class="text-secondary font-medium hover:text-primary transition-colors">文创众筹</a>
                </div>
                <a href="map.html" class="text-secondary hover:text-primary transition-colors">
                    <i class="fa fa-arrow-left"></i> 返回地图
                </a>
            </div>
        </div>
    </nav>

    <!-- 预约表单 -->
    <section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
        <div class="glass rounded-xl p-8">
            <h2 class="font-song font-bold text-2xl text-primary mb-2">预约参观非遗工坊</h2>
            <p class="text-secondary/80 mb-6" id="workshopName">正在加载工坊信息...</p>
            
            <form id="bookingForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-dark mb-1">姓名</label>
                        <input type="text" id="name" name="name" required 
                            class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-dark mb-1">手机号码</label>
                        <input type="tel" id="phone" name="phone" required 
                            class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                    </div>
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-dark mb-1">电子邮箱</label>
                    <input type="email" id="email" name="email" 
                        class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="visitDate" class="block text-sm font-medium text-dark mb-1">参观日期</label>
                        <input type="date" id="visitDate" name="visitDate" required 
                            class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                    </div>
                    <div>
                        <label for="visitTime" class="block text-sm font-medium text-dark mb-1">参观时间</label>
                        <select id="visitTime" name="visitTime" required 
                            class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                            <option value="">请选择时间</option>
                            <option value="09:00">09:00</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label for="visitors" class="block text-sm font-medium text-dark mb-1">参观人数</label>
                    <input type="number" id="visitors" name="visitors" min="1" max="20" required 
                        class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30">
                </div>
                
                <div>
                    <label for="message" class="block text-sm font-medium text-dark mb-1">备注信息</label>
                    <textarea id="message" name="message" rows="3" 
                        class="w-full px-4 py-2 rounded-lg border border-secondary/20 focus:outline-none focus:ring-2 focus:ring-primary/30" 
                        placeholder="如有特殊需求或问题，请在此注明"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-primary text-light py-3 rounded-lg font-medium hover:bg-primary/90 transition-colors">
                    提交预约
                </button>
            </form>
        </div>
    </section>

    <!-- 页脚 (与map.html相同) -->
    <footer class="w-full bg-dark text-light py-12">
        <!-- 页脚内容保持不变 -->
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取工坊ID并显示工坊名称
            const workshopId = localStorage.getItem('selectedWorkshop');
            if (!workshopId) {
                window.location.href = 'map.html';
                return;
            }
            
            // 这里应该从API或数据中获取工坊信息
            // 为简单起见，我们假设有一个工坊数据数组
            const workshopData = {
                '1': '苏州苏绣工坊',
                '2': '华县皮影戏传习所',
                // 其他工坊数据...
            };
            
            const workshopName = workshopData[workshopId] || '未知工坊';
            document.getElementById('workshopName').textContent = `您正在预约参观：${workshopName}`;
            
            // 设置最小日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('visitDate').min = today;
            
            // 表单提交处理
            document.getElementById('bookingForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 获取表单数据
                const formData = {
                    workshopId: workshopId,
                    workshopName: workshopName,
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    visitDate: document.getElementById('visitDate').value,
                    visitTime: document.getElementById('visitTime').value,
                    visitors: document.getElementById('visitors').value,
                    message: document.getElementById('message').value
                };
                
                // 这里应该发送数据到服务器
                console.log('预约数据:', formData);
                
                // 显示成功消息
                alert('预约成功！我们会尽快与您确认参观安排。');
                
                // 重定向回地图页面
                window.location.href = 'map.html';
            });
        });
    </script>
</body>
</html>
